server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

notoai:
  ocr:
    api-key: ${OCR_API_KEY}
    secret-key: ${OCR_SECRET_KEY}
  embedding:
    api-key: ${EMBEDDING_API_KEY}
  llm:
    api-key: ${LLM_API_KEY}
    model: deepseek-chat
